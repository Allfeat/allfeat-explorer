name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Honors rust-toolchain.toml (channel + components + targets).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # Two feature combos cover both code paths gated by `mock`:
      #   * `ssr`        — prod build (RpcProvider + sqlx).
      #   * `ssr,mock`   — dev / Playwright build (MockProvider, no subxt/sqlx).
      # `mock` is mutually exclusive with the live providers at compile time,
      # so each combo must check independently.
      - name: cargo check (ssr)
        run: cargo check --features ssr --bin allfeat-explorer

      - name: cargo check (ssr,mock)
        run: cargo check --features ssr,mock --bin allfeat-explorer

      - name: clippy (ssr)
        run: cargo clippy --features ssr --bin allfeat-explorer --no-deps -- -D warnings

      - name: clippy (ssr,mock)
        run: cargo clippy --features ssr,mock --bin allfeat-explorer --no-deps -- -D warnings

  web:
    name: web (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # `nuxt prepare` runs as a postinstall hook and is required for typecheck.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck
