name: Publish container images

on:
  push:
    tags:
      - 'backend-v*'
      - 'web-v*'
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # Compute the build matrix dynamically so a `<component>-v*` tag only builds
  # that one image. Branch pushes and manual dispatches build both. This lives
  # in its own job because GitHub Actions does not allow `matrix.*` references
  # in job-level `if:` expressions, so static matrix-filtering doesn't work.
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          BACKEND='{"component":"backend","dockerfile":"deploy/docker/Dockerfile.backend","image":"allfeat-explorer-backend"}'
          WEB='{"component":"web","dockerfile":"deploy/docker/Dockerfile.web","image":"allfeat-explorer-web"}'
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            case "$GITHUB_REF_NAME" in
              backend-v*) MATRIX="{\"include\":[$BACKEND]}" ;;
              web-v*)     MATRIX="{\"include\":[$WEB]}" ;;
              *) echo "::error::unrecognized tag '$GITHUB_REF_NAME'"; exit 1 ;;
            esac
          else
            MATRIX="{\"include\":[$BACKEND,$WEB]}"
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    name: build & push (${{ matrix.component }})
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   * `master`           → rolling tag for the default branch
      #   * `sha-<short>`      → stable pin the GitOps repo can bump to
      #   * `1.2.3`, `1.2`     → emitted from `<component>-v*` git tags via type=match
      #   * `latest`           → moved only on a tag for *this* component
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=match,pattern=${{ matrix.component }}-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=${{ matrix.component }}-v(\d+\.\d+),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, format('refs/tags/{0}-v', matrix.component)) }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Persistent layer cache scoped per component so the backend and
          # web builds don't thrash each other's layers.
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false

  # GitOps: after a release tag is built and pushed to GHCR, bump the
  # corresponding image newTag in Allfeat/infra-web3 so ArgoCD rolls it out.
  # Tag pushes only — branch builds use the floating `master` / `sha-*` tags
  # which the GitOps repo doesn't track.
  bump-infra:
    name: bump infra-web3
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    # Serialize across all tag refs so concurrent backend + web releases
    # don't race on the same kustomization.yaml in infra-web3.
    concurrency:
      group: bump-infra-web3
      cancel-in-progress: false
    steps:
      - name: Parse tag
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          COMPONENT="${TAG%%-v*}"
          VERSION="${TAG#*-v}"
          case "$COMPONENT" in
            backend) IMAGE_NAME=IMAGE_BACKEND ;;
            web)     IMAGE_NAME=IMAGE_WEB ;;
            *) echo "::error::unknown component '$COMPONENT' from tag '$TAG'"; exit 1 ;;
          esac
          {
            echo "component=$COMPONENT"
            echo "version=$VERSION"
            echo "image_name=$IMAGE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout infra-web3
        uses: actions/checkout@v4
        with:
          repository: Allfeat/infra-web3
          token: ${{ secrets.CI_INFRA_WEB3_PAT }}
          ref: master
          path: infra-web3

      - name: Bump image tag and push
        working-directory: infra-web3
        env:
          IMAGE_NAME: ${{ steps.tag.outputs.image_name }}
          VERSION: ${{ steps.tag.outputs.version }}
          COMPONENT: ${{ steps.tag.outputs.component }}
        run: |
          set -euo pipefail
          FILE="kubernetes/overlays/prod/apps/allfeat-explorer/kustomization.yaml"
          yq -i '(.images[] | select(.name == strenv(IMAGE_NAME)) | .newTag) = strenv(VERSION)' "$FILE"
          if git diff --quiet -- "$FILE"; then
            echo "::notice::infra-web3 already at ${VERSION} for ${IMAGE_NAME}, nothing to commit"
            exit 0
          fi
          git --no-pager diff -- "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "ci(prod): bump allfeat-explorer-${COMPONENT} to ${VERSION}"
          git push origin master
