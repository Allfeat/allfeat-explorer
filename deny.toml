# cargo-deny configuration.
#
# Audited by the `audit` CI workflow on every push / PR and weekly on a
# schedule. The policy below is deliberately conservative: permissive
# licenses only, hard-fail on vulnerabilities, warn-only on duplicate
# versions so common transitive drift doesn't break CI on unrelated PRs.

[graph]
# Target all common build profiles — the server binary, the wasm hydrate
# bundle, and the mock variant — so a GPL dep that only appears in one
# target is still caught.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "wasm32-unknown-unknown" },
]
all-features = false
no-default-features = false

[advisories]
version = 2
# Block any known-vulnerable dep. `unmaintained` is warn-only because
# upstream labels them eagerly and false-positives are common.
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # OpenSSL 3.x switched to Apache-2.0, but older transitive pulls may
    # still surface OpenSSL. Drop this line once the graph has cleared.
    "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
# Warn-only: transitive duplicate versions are near-impossible to keep
# zero without constant micro-bumps; we just want visibility.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Explicit deny list for crates we'd rather never see in the tree.
deny = []
skip = []
skip-tree = []

[sources]
# Only crates.io. No git / local overrides should slip through — if one
# does, the audit should flag it loudly.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
